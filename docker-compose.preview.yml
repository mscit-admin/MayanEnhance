name: mayan-ui-preview

x-mayan-env: &mayan-env
  MAYAN_CELERY_BROKER_URL: amqp://mayan:mayanrabbitpass@rabbitmq:5672/mayan
  MAYAN_CELERY_RESULT_BACKEND: redis://:mayanredispassword@redis:6379/1
  MAYAN_DATABASES: "{'default':{'ENGINE':'django.db.backends.postgresql','NAME':'mayan','PASSWORD':'mayandbpass','USER':'mayan','HOST':'postgresql','PORT':5432,'CONN_MAX_AGE':0}}"
  MAYAN_LOCK_MANAGER_BACKEND: mayan.apps.lock_manager.backends.redis_lock.RedisLock
  MAYAN_LOCK_MANAGER_BACKEND_ARGUMENTS: "{'redis_url':'redis://:mayanredispassword@redis:6379/2'}"

x-mayan-container: &mayan-container
  image: mayanedms/mayanedms:latest
  environment:
    <<: *mayan-env
    MAYAN_COMMON_PROJECT_TITLE: EDMS
    MAYAN_COMMON_EXTRA_APPS: "['mayan.apps.external_sharing.apps.ExternalSharingApp']"
  networks:
    - mayan
  volumes:
    - app:/var/lib/mayan
    - ./mayan/apps/appearance/static/appearance/css/appearance.css:/opt/mayan-edms/static/appearance/css/appearance.css:ro
    - ./mayan/apps/appearance/static/appearance/css/appearance.css:/opt/mayan-edms/static/appearance/css/appearance.0fe65bf01189.css:ro
    - ./mayan/apps/appearance/static/appearance/css/appearance.css:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance/static/appearance/css/appearance.css:ro
    - ./mayan/apps/authentication/templates/authentication/login.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/authentication/templates/authentication/login.html:ro
    - ./preview-overrides/appearance/templates/appearance/app/head.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance/templates/appearance/app/head.html:ro
    - ./preview-overrides/appearance_bootstrap/templates/appearance/root.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance_bootstrap/templates/appearance/root.html:ro
    - ./preview-overrides/appearance_bootstrap/templates/appearance/menus/main.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance_bootstrap/templates/appearance/menus/main.html:ro
    - ./preview-overrides/appearance_bootstrap/templates/appearance/menus/topbar.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance_bootstrap/templates/appearance/menus/topbar.html:ro
    - ./preview-overrides/appearance_bootstrap/templates/appearance/partials/meta.html:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/appearance_bootstrap/templates/appearance/partials/meta.html:ro
    - ./preview-overrides/locales/views.py:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/locales/views.py:ro
    - ./preview-overrides/locales/urls.py:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/locales/urls.py:ro
    - ./preview-overrides/external_sharing:/opt/mayan-edms/lib/python3.13/site-packages/mayan/apps/external_sharing:ro

services:
  app:
    <<: *mayan-container
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8088:8000"

  postgresql:
    image: postgres:15.14
    command:
      - postgres
      - -c
      - default_statistics_target=200
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=150
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=32MB
    environment:
      POSTGRES_DB: mayan
      POSTGRES_PASSWORD: mayandbpass
      POSTGRES_USER: mayan
    healthcheck:
      test: ["CMD", "pg_isready", "--dbname", "mayan", "--username", "mayan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mayan
    volumes:
      - postgres:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4.1.4-management
    environment:
      RABBITMQ_DEFAULT_PASS: mayanrabbitpass
      RABBITMQ_DEFAULT_USER: mayan
      RABBITMQ_DEFAULT_VHOST: mayan
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit consumer_timeout 1800000
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 20s
    hostname: rabbitmq
    networks:
      - mayan
    volumes:
      - rabbitmq:/var/lib/rabbitmq

  redis:
    image: redis:7.4.5
    command:
      - redis-server
      - --appendonly
      - "no"
      - --databases
      - "3"
      - --maxmemory
      - "100mb"
      - --maxclients
      - "500"
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --tcp-backlog
      - "256"
      - --requirepass
      - mayanredispassword
    networks:
      - mayan
    volumes:
      - redis:/data

networks:
  mayan:

volumes:
  app:
  postgres:
  rabbitmq:
  redis:
